---
name: Build and push to GHCR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Override tag (e.g. v0.2.0). Defaults to latest git tag."
        required: false
        type: string

env:
  REGISTRY: ghcr.io/indifferentketchup/boofinity
  CONTEXT: libs/boofinity

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: cpu
            dockerfile: Dockerfile.cpu_auto
            platforms: linux/amd64,linux/arm64
          - name: cuda
            dockerfile: Dockerfile.nvidia_auto
            platforms: linux/amd64
          - name: rocm
            dockerfile: Dockerfile.amd_auto
            platforms: linux/amd64
          - name: vulkan
            dockerfile: Dockerfile.vulkan_auto
            platforms: linux/amd64,linux/arm64
          - name: trt
            dockerfile: Dockerfile.trt_onnx_auto
            platforms: linux/amd64

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            # Strip a leading v from the dispatch input so v0.2.0 -> 0.2.0
            # (the push path below strips it the same way).
            echo "version=${INPUT_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate resolved version is a release semver
        id: semver
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          # Fully anchored release-semver pattern: rejects branch names
          # (ik-main), dot-quad (1.2.3.4), and pre-release/build-metadata
          # suffixes (0.2.0-rc1, 0.2.0+build). Both anchors are required.
          if printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "Resolved version '$VERSION' is not a full release semver (X.Y.Z)." >&2
            exit 1
          fi

      - name: Assert pyproject version matches resolved tag
        # Runs on every versioned publish: a tag push OR a dispatch that
        # supplied inputs.tag. A bare branch dispatch (no tag) is already
        # rejected by the semver guard above.
        if: ${{ github.event_name == 'push' || github.event.inputs.tag != '' }}
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          PYPROJECT_VERSION=$(grep -m1 '^version = ' "${CONTEXT}/pyproject.toml" \
            | sed -E 's/^version = "(.*)"/\1/')
          echo "pyproject version: $PYPROJECT_VERSION; resolved version: $VERSION"
          if [ "$PYPROJECT_VERSION" != "$VERSION" ]; then
            echo "pyproject.toml version ($PYPROJECT_VERSION) does not match resolved tag ($VERSION)." >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.CONTEXT }}/${{ matrix.variant.dockerfile }}
          target: production-ci
          platforms: ${{ matrix.variant.platforms }}
          tags: |
            ${{ env.REGISTRY }}:v${{ steps.tag.outputs.version }}-${{ matrix.variant.name }}
            ${{ steps.semver.outputs.valid == 'true' && format('{0}:latest-{1}', env.REGISTRY, matrix.variant.name) || '' }}
          push: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}:v${{ steps.tag.outputs.version }}-${{ matrix.variant.name }},type=gha
          cache-to: type=inline
