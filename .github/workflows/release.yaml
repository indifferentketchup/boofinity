---
### Release all docker containers
name: libs/boofinity - Release docker

on:
  release:
    types: [published]

env:
  POETRY_VERSION: "1.8.5"
  WORKDIR: "libs/boofinity"

jobs:
  docker-container-push-nvidia:
    uses:
      ./.github/workflows/release_docker_container.yaml
    with:
      # working-directory: libs/boofinity
      dockerfile: libs/boofinity/Dockerfile.nvidia_auto
      image: michaelf34/infinity
      appendix_tag: ""
      platforms: "linux/amd64,linux/arm64"
    secrets: inherit
  
  docker-container-push-cpu:
    uses:
      ./.github/workflows/release_docker_container.yaml
    with:
      # working-directory: libs/boofinity
      dockerfile: libs/boofinity/Dockerfile.cpu_auto
      image: michaelf34/infinity
      appendix_tag: "-cpu"
      platforms: "linux/amd64"
    secrets: inherit
  
